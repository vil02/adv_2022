---
name: python_test

'on':
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  python_test:
    runs-on: ${{matrix.os}}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
        python-version: [3.12]

    steps:
      - name: Checkout
        if: "! github.event.pull_request.head.repo.fork "
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          submodules: 'recursive'
          token: ${{ secrets.ADV_INPUTS }}

      - name: Checkout (no submodule with inputs)
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name != github.repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python ${{matrix.python-version}}
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{matrix.python-version}}

      - name: Set up Poetry
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1.4.2

      - name: Install dependencies
        env:
          POETRY_INSTALLER_ONLY_BINARY: ":all:"
        run: |
          poetry install --with dev

      - name: Run liter
        run: |
          ./check_all_python_scripts.sh
      - name: Test with pytest
        run: |
          poetry run pytest -n 2
...
